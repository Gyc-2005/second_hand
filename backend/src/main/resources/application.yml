server:
  port: 8080
  servlet:
    session:
      timeout: 1800s
      cookie:
        max-age: 1800s

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/secondhand_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: asdf1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

file:
  upload-dir: ./uploads
  access-url: /uploads/

logging:
  level:
    com.example.secondhand: DEBUG
    org.hibernate.SQL: DEBUG
